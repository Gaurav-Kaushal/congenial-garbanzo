apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: hello-api
  template:
    metadata:
      labels:
        app: hello-api
    spec:
      containers:
        - name: hello-api
          image: myregistry/hello-api:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
