apiVersion: v1
kind: Namespace
metadata:
  name: hello-api
  labels:
    app: hello-api
---
# Horizontal Pod Autoscaler
# Automatically scales pods between 2-10 based on CPU usage
# Was missing entirely — no way to handle traffic spikes
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hello-api
  namespace: hello-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hello-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
# Pod Disruption Budget
# Ensures at least 1 pod is always running during node drains/upgrades
# Was missing — without this, all pods could be evicted simultaneously
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: hello-api
  namespace: hello-api
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: hello-api
